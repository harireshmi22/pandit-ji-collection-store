services:
  # MongoDB Service
  mongodb:
    image: mongo:7.0
    container_name: pandit-ji-mongodb
    restart: unless-stopped
    ports:
      - "27019:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: pandit-ji-collection
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro

  # Redis Service
  redis:
    image: redis:7.2-alpine
    container_name: pandit-ji-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes --requirepass redis123
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:
